name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - release-debug

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew assemble${{ inputs.build_type == 'debug' && 'Debug' || inputs.build_type == 'release' && 'Release' || 'ReleaseDebug' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: moonreader-apk-${{ inputs.build_type }}
          path: app/build/outputs/apk/${{ inputs.build_type == 'debug' && 'debug' || inputs.build_type == 'release' && 'release' || 'release-debug' }}/*.apk